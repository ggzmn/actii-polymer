<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>ACT II</title>

    <script src="./bower_components/webcomponentsjs/webcomponents-lite.js"></script>
    <link rel="import" href="./elements/card-wrapper.html" />
    <script>
      var baseURl = (window.appImageUrl = "../../assets/img/");
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-image: radial-gradient(
          circle,
          #0091ff,
          #0a7ada,
          #0b64b5,
          #084e92,
          #043a71
        );
      }
      :root {
        --menu-container: {
          padding: 0 20px;
        };
      }
    </style>
  </head>

  <body>
    <card-wrapper id="tarjetita"></card-wrapper>
    <script>
      window.addEventListener("WebComponentsReady", function () {
        var tarjetitaID = document.getElementById("tarjetita");
        var arrayOptions = [
          {
            name: "SABORES",
            event: "sabores",
          },
          {
            name: "VIDEO",
            event: "videos",
          },
          {
            name: "IMÁGENES",
            event: "imagenes",
          },
        ];
        tarjetitaID.set("menuOpciones", arrayOptions);
        var preSelectedOption = {
          name: "VIDEO",
          event: "videos",
        };
        tarjetitaID.set("preSelected", preSelectedOption);
      });
    </script>
  </body>
</html>
